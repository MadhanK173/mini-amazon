<!DOCTYPE html>
<html>

<head>

<title>Write Review - Mini Amazon</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

.star{
font-size:30px;
cursor:pointer;
color:#ccc;
}

.star.active{
color:gold;
}

.review-card{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
margin-bottom:10px;
background:#f9f9f9;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-danger p-2">

<div class="container-fluid d-flex justify-content-between align-items-center">

<a href="index.html" class="logo">
<img src="images/mini-amazon-logo.png" height="40">
</a>

<div class="d-flex align-items-center">

<a href="cart.html" class="cart-icon me-3">
<i class="bi bi-cart3"></i>
<span id="cart-count" class="cart-count">0</span>
</a>

<button class="btn btn-light logout-btn" id="logoutBtn">
Logout
</button>

</div>

</div>

</nav>

<div class="container mt-4">

<h3>Rate this Product</h3>

<div id="rating-stars">

<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>

</div>

<p id="rating-value" class="mt-2 text-warning"></p>

<br>

<h4>Write Review</h4>

<textarea id="review-text"
class="form-control"
placeholder="Write your review here..."
rows="4"></textarea>

<br>

<button class="btn btn-primary" id="submit-review-btn">
Submit Review
</button>

<hr>

<h4>Customer Reviews</h4>

<!-- ⭐ Average rating appears here -->
<div id="average-rating" class="mb-3"></div>

<div id="reviews-list"></div>

</div>

<script>

/* LOGIN CHECK */

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="login.html";
}

/* GET PRODUCT ID */

const params = new URLSearchParams(window.location.search);

const productId = parseInt(params.get("id"));

const verified = params.get("verified") ? "Verified" : "Unverified";

if(!productId){
alert("Product not found");
window.location.href="index.html";
}

/* STAR RATING */

let selectedRating = 0;

const stars = document.querySelectorAll(".star");

stars.forEach((star,index)=>{

star.addEventListener("click",function(){

selectedRating = index + 1;

stars.forEach(s => s.classList.remove("active"));

for(let i=0;i<selectedRating;i++){
stars[i].classList.add("active");
}

document.getElementById("rating-value").innerText =
"Your Rating: " + selectedRating + " ⭐";

});

});


/* SUBMIT REVIEW */

document.getElementById("submit-review-btn")
.addEventListener("click", async function(){

const reviewText = document.getElementById("review-text").value.trim();

if(reviewText === ""){
alert("Write a review first");
return;
}

if(selectedRating === 0){
alert("Please select rating");
return;
}

try{

const response = await fetch("http://localhost:5000/add-review",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
user_id:user.id,
product_id:productId,
review_text:reviewText,
rating:selectedRating,
verified_purchase: verified
})

});

const data = await response.json();

if(data.success){

alert("Review submitted successfully");

document.getElementById("review-text").value="";

selectedRating=0;

stars.forEach(s=>s.classList.remove("active"));

loadReviews();

}else{

alert("Review failed");

}

}catch(error){

console.log(error);
alert("Server error");

}

});


/* LOAD REVIEWS */

async function loadReviews(){

try{

const res = await fetch("http://localhost:5000/reviews/" + productId);

const data = await res.json();

const container = document.getElementById("reviews-list");

const avgContainer = document.getElementById("average-rating");

container.innerHTML="";
avgContainer.innerHTML="";

/* If no reviews */

if(!data.success || data.reviews.length === 0){

container.innerHTML =
"<div class='alert alert-info'>No reviews yet</div>";

return;

}

/* Calculate average */

let total = 0;

data.reviews.forEach(r=>{
total += r.rating;
});

const avg = (total / data.reviews.length).toFixed(1);

avgContainer.innerHTML =
"<h5>Average Rating: " + avg + " ⭐ (" + data.reviews.length + " reviews)</h5>";

/* Show reviews */

data.reviews.forEach(r => {


const badge = r.verified_purchase === "Verified"
? `<span style="color:green;font-weight:bold;">✔ Verified Purchase</span>`
: `<span style="color:red;font-weight:bold;">✖ Unverified Purchase</span>`;
container.innerHTML += `
<div class="review-card">

<b>${r.username}</b><br>

${badge}

<p>Rating: ${r.rating} ⭐</p>

<p>${r.review_text}</p>

</div>
`;

});

}catch(err){

console.log(err);

}

}

loadReviews();


/* LOGOUT */

document.getElementById("logoutBtn")
.addEventListener("click",function(){

localStorage.removeItem("user");

window.location.href="login.html";

});


/* CART BADGE */

function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(i => total += i.quantity);

document.getElementById("cart-count").innerText = total;

}

updateCartCount();

</script>

</body>
</html>
