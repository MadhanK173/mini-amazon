<!DOCTYPE html>
<html>

<head>

<title>Product Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

</head>

<body>

<!-- =========================
NAVBAR
========================= -->

<nav class="navbar navbar-dark bg-danger p-2">

<div class="container-fluid d-flex justify-content-between align-items-center">

<a href="index.html" class="logo">
<img src="images/mini-amazon-logo.png" height="40">
</a>

<div class="d-flex align-items-center">

<a href="cart.html" class="cart-icon me-3">
<i class="bi bi-cart3"></i>
<span id="cart-count" class="cart-count">0</span>
</a>

<button class="btn btn-light logout-btn" id="logoutBtn">
Logout
</button>

</div>

</div>

</nav>


<!-- =========================
PRODUCT DETAILS SECTION
========================= -->

<div class="container mt-4">

<h3 class="mb-4">Product Details</h3>

<div class="row">

<!-- PRODUCT IMAGE -->

<div class="col-md-5 text-center">

<img id="product-image"
class="img-fluid border rounded p-2"
style="max-height:350px"
onerror="this.src='https://via.placeholder.com/300x300?text=Product'">

</div>


<!-- PRODUCT INFORMATION -->

<div class="col-md-7">

<h3 id="product-name"></h3>

<h4 id="product-price" class="text-success"></h4>

<div id="product-details"></div>

<br>

<button class="btn btn-success" id="add-cart-btn">
Add to Cart
</button>

</div>

</div>

<hr>


<!-- =========================
DELIVERY ADDRESS
========================= -->

<h4>Delivery Address</h4>

<div class="row">

<div class="col-md-6 mb-3">
<label>Address</label>
<input type="text" id="address" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Flat / House No</label>
<input type="text" id="flat" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>City</label>
<input type="text" id="city" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Pincode</label>
<input type="number" id="pincode" class="form-control">
</div>

</div>

<div class="mt-3">

<button class="btn btn-warning" id="place-order-btn">
Place Order
</button>

<button class="btn btn-primary ms-2" id="review-btn">
Write Review
</button>

</div>

</div>



<script>

/* =========================
LOGIN PROTECTION
========================= */

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href = "login.html";
}


/* =========================
LOGOUT
========================= */

document.getElementById("logoutBtn").addEventListener("click",function(){

localStorage.removeItem("user");
window.location.href = "login.html";

});


/* =========================
GLOBAL PRODUCT VARIABLE
========================= */

let currentProduct = null;


/* =========================
LOAD PRODUCT FROM MYSQL
========================= */

async function loadProduct(){

const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

if(!productId){
alert("Product not found");
window.location.href="index.html";
return;
}

try{

const response = await fetch(`https://mini-amazon-2lur.onrender.com/api/products/${productId}`);
const data = await response.json();

if(data.success && data.product){

const product = data.product;
currentProduct = product;

/* IMAGE */
document.getElementById("product-image").src = product.image;

/* NAME */
document.getElementById("product-name").innerText = product.name;

/* PRICE */
document.getElementById("product-price").innerText = "₹" + product.price;

/* DETAILS */

document.getElementById("product-details").innerHTML = `

<table class="table table-bordered">

<tr><td><b>Brand</b></td><td>${product.brand || "-"}</td></tr>
<tr><td><b>Model</b></td><td>${product.model || "-"}</td></tr>
<tr><td><b>Primary Use</b></td><td>${product.primary_use || "-"}</td></tr>
<tr><td><b>Size</b></td><td>${product.size || "-"}</td></tr>
<tr><td><b>Color</b></td><td>${product.color || "-"}</td></tr>
<tr><td><b>Net Quantity</b></td><td>${product.net_quantity || "-"}</td></tr>
<tr><td><b>Exchange</b></td><td>${product.exchangeable || "-"}</td></tr>
<tr><td><b>Exchange Duration</b></td><td>${product.exchange_duration || "-"}</td></tr>
<tr><td><b>Expected Delivery</b></td><td>${product.expected_delivery || "-"}</td></tr>

</table>

`;

}

}catch(err){

console.log("Error loading product",err);

}

}

loadProduct();


/* =========================
ADD TO CART
========================= */

document.getElementById("add-cart-btn").addEventListener("click",function(){

if(!currentProduct){
alert("Product not loaded");
return;
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existing = cart.find(item => item.id === currentProduct.product_id);

if(existing){

existing.quantity++;

}else{

cart.push({
id: currentProduct.product_id,
name: currentProduct.name,
price: currentProduct.price,
image: currentProduct.image,
quantity:1
});

}

localStorage.setItem("cart",JSON.stringify(cart));

updateCartCount();

alert("Product added to cart");

});


/* =========================
UPDATE CART BADGE
========================= */

function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item=>{
total += item.quantity;
});

const cartCount = document.getElementById("cart-count");

if(cartCount){
cartCount.innerText = total;
}

}

updateCartCount();


/* =========================
PLACE ORDER
========================= */

document.getElementById("place-order-btn").addEventListener("click",function(){

let address = document.getElementById("address").value.trim();
let city = document.getElementById("city").value.trim();
let pincode = document.getElementById("pincode").value.trim();

if(address === "" || city === "" || pincode === ""){

alert("Please enter delivery address");
return;

}

/* Order success */

alert("Order placed successfully! Please write your review.");

/* Get product id */

const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

/* Redirect to review page */

window.location.href = "review.html?id=" + productId + "&verified=1";

});


/* =========================
WRITE REVIEW
========================= */

document.getElementById("review-btn").addEventListener("click",function(){

const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

window.location.href = "review.html?id=" + productId;

});

</script>

</body>

</html>
