<!DOCTYPE html>
<html>
<head>

<title>Mini Amazon Register</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.register-box{
background:white;
padding:30px;
border-radius:8px;
width:330px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:4px;
}

.password-container{
position:relative;
}

.toggle-password{
position:absolute;
right:10px;
top:18px;
cursor:pointer;
font-size:14px;
color:#555;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#ff9900;
border:none;
cursor:pointer;
border-radius:4px;
color:white;
font-weight:bold;
}

button:hover{
background:#e68a00;
}

#registerMessage{
color:red;
margin-top:10px;
font-size:14px;
}

.password-rules{
font-size:12px;
color:#555;
margin-top:5px;
line-height:1.5;
}

#strengthBar{
height:6px;
margin-top:6px;
border-radius:4px;
background:#ddd;
}

#strengthLevel{
height:100%;
width:0%;
border-radius:4px;
transition:0.3s;
}

.strength-text{
font-size:12px;
margin-top:3px;
}

</style>

</head>

<body>

<div class="register-box">

<h2>Create Account</h2>

<form id="registerForm">

<input type="text" id="username" placeholder="Username" required>

<input type="email" id="email" placeholder="Email" required>

<div class="password-container">

<input type="password" id="password" placeholder="Password" required>

<span class="toggle-password" onclick="togglePassword()">👁</span>

</div>

<div id="strengthBar">
<div id="strengthLevel"></div>
</div>

<div class="strength-text" id="strengthText"></div>

<div class="password-rules">
Password must contain:
<br>• Minimum 8 characters
<br>• 1 uppercase letter
<br>• 1 lowercase letter
<br>• 1 number
<br>• 1 special character (!@#$%^&*)
</div>

<button type="submit">Register</button>

</form>

<p id="registerMessage"></p>

<p style="margin-top:15px;">
Already have an account? <a href="login.html">Login</a>
</p>

</div>

<script>

const form = document.getElementById("registerForm");
const message = document.getElementById("registerMessage");
const passwordInput = document.getElementById("password");
const strengthBar = document.getElementById("strengthLevel");
const strengthText = document.getElementById("strengthText");


/* ======================
SHOW / HIDE PASSWORD
====================== */

function togglePassword(){

if(passwordInput.type === "password"){
passwordInput.type = "text";
}else{
passwordInput.type = "password";
}

}


/* ======================
PASSWORD STRENGTH METER
====================== */

passwordInput.addEventListener("input",function(){

const password = passwordInput.value;

let strength = 0;

if(password.length >= 8) strength++;
if(/[A-Z]/.test(password)) strength++;
if(/[a-z]/.test(password)) strength++;
if(/[0-9]/.test(password)) strength++;
if(/[!@#$%^&*]/.test(password)) strength++;

if(strength <=2){
strengthBar.style.width="33%";
strengthBar.style.background="red";
strengthText.innerText="Weak password";
strengthText.style.color="red";
}
else if(strength ===3 || strength ===4){
strengthBar.style.width="66%";
strengthBar.style.background="orange";
strengthText.innerText="Medium password";
strengthText.style.color="orange";
}
else{
strengthBar.style.width="100%";
strengthBar.style.background="green";
strengthText.innerText="Strong password";
strengthText.style.color="green";
}

});


/* ======================
REGISTER FORM
====================== */

form.addEventListener("submit", async function(e){

e.preventDefault();

const username = document.getElementById("username").value.trim();
const email = document.getElementById("email").value.trim();
const password = passwordInput.value.trim();

if(!username || !email || !password){
message.innerText = "Please fill all fields";
return;
}


/* ======================
STRONG PASSWORD CHECK
====================== */

const strongPassword =
/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;

if(!strongPassword.test(password)){
message.innerText =
"Password must contain uppercase, lowercase, number, special character and minimum 8 characters";
return;
}


try{

const response = await fetch("https://mini-amazon-2lur.onrender.com/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
username: username,
email: email,
password: password
})

});

const data = await response.json();

if(data.success){

alert("Registration successful!");

window.location.href = "login.html";

}else{

message.innerText = data.message;

}

}
catch(error){

message.innerText = "Server connection failed";

}

});

</script>

</body>
</html>
