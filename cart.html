<!DOCTYPE html>
<html>

<head>

<title>Your Cart - Mini Amazon</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

</head>

<body>

<!-- =========================
NAVBAR
========================= -->

<nav class="navbar navbar-dark bg-danger p-2">

<div class="container-fluid d-flex justify-content-between align-items-center">

<a href="index.html" class="logo">
<img src="images/mini-amazon-logo.png" height="40">
</a>

<div class="d-flex align-items-center">

<a href="cart.html" class="cart-icon me-3">

<i class="bi bi-cart3"></i>

<span id="cart-count" class="cart-count">0</span>

</a>

<button class="btn btn-light logout-btn" id="logoutBtn">
Logout
</button>

</div>

</div>

</nav>



<!-- =========================
CART SECTION
========================= -->

<div class="container mt-4">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<div class="mt-4">

<h4>Total: ₹<span id="cart-total">0</span></h4>

<button class="btn btn-success mt-2" id="placeOrderBtn">
Place Order
</button>

</div>

</div>



<script src="js/products.js"></script>



<script>

/* =========================
LOGIN PROTECTION
========================= */

const user = JSON.parse(localStorage.getItem("user"));

if(!user){

window.location.href = "login.html";

}


/* =========================
LOGOUT
========================= */

document.getElementById("logoutBtn").addEventListener("click",function(){

localStorage.removeItem("user");

window.location.href = "login.html";

});


/* =========================
UPDATE CART BADGE
========================= */

function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item=>{
total += item.quantity;
});

const cartCount = document.getElementById("cart-count");

if(cartCount){
cartCount.innerText = total;
}

}

updateCartCount();


</script>

</body>

</html>
