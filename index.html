<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Amazon</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

/* AMAZON RED HEADER */

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
background:#d32f2f;
padding:10px 20px;
color:white;
}

.logo img{
height:40px;
}

/* SEARCH BAR */

.search-container{
background:white;
border-radius:30px;
padding:6px 15px;
display:flex;
align-items:center;
width:450px;
}

.search-container input{
border:none;
outline:none;
width:100%;
font-size:15px;
}

.search-icon{
margin-right:10px;
color:#555;
}

/* CATEGORY BAR */

.category-bar{
display:flex;
justify-content:center;
gap:25px;
padding:10px;
background:#f1f1f1;
border-bottom:1px solid #ddd;
}

.category-item{
cursor:pointer;
padding:6px 14px;
border-radius:5px;
}

.category-item.active{
background:#d9d9d9;
}

/* CART ICON */

.cart-icon{
position:relative;
font-size:24px;
color:white;
}

.cart-count{
position:absolute;
top:-6px;
right:-10px;
background:yellow;
color:black;
font-size:12px;
border-radius:50%;
padding:2px 6px;
}

.logout-btn{
background:#ff9900;
border:none;
border-radius:20px;
padding:6px 15px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- =========================
NAVBAR
========================= -->

<div class="navbar">

<div class="logo">
<img src="images/mini-amazon-logo.png">
</div>

<div class="search-container">
<i class="bi bi-search search-icon"></i>
<input type="text" id="search-input" placeholder="Search products">
</div>

<div style="display:flex;align-items:center;gap:20px;">

<a href="cart.html" class="cart-icon">
<i class="bi bi-cart3"></i>
<span id="cart-count" class="cart-count">0</span>
</a>

<button class="logout-btn" id="logoutBtn">Logout</button>

</div>

</div>


<!-- =========================
CATEGORY BAR
========================= -->

<div class="category-bar">

<span class="category-item active" data-category="All">All</span>
<span class="category-item" data-category="Fashion">Fashion</span>
<span class="category-item" data-category="Mobiles">Mobiles</span>
<span class="category-item" data-category="Electronics">Electronics</span>
<span class="category-item" data-category="Beauty">Beauty</span>
<span class="category-item" data-category="Sports">Sports</span>
<span class="category-item" data-category="Books">Books</span>

</div>


<h2 id="suggested-title" style="margin-left:20px;">
Suggested For You
</h2>

<div id="productsContainer" class="products-container"></div>


<script src="js/products.js"></script>

<script>

/* LOGOUT */

document.getElementById("logoutBtn").addEventListener("click",function(){

localStorage.removeItem("user");
window.location.href="login.html";

});


/* CATEGORY ACTIVE COLOR + FILTER */

const categoryButtons = document.querySelectorAll(".category-item");
const suggestedTitle = document.getElementById("suggested-title");

categoryButtons.forEach(button=>{

button.addEventListener("click",function(){

categoryButtons.forEach(btn=>btn.classList.remove("active"));
this.classList.add("active");

let category = this.dataset.category;

/* ALL CATEGORY */

if(category === "All"){

let first80 = products.slice(0,80);

displayProducts(first80);

suggestedTitle.style.display = "block";

}

/* OTHER CATEGORIES */

else{

let filtered = products.filter(product =>
product.category &&
product.category.toLowerCase() === category.toLowerCase()
);

displayProducts(filtered);

suggestedTitle.style.display = "none";

}

});

});


/* CART BADGE */

function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item=>{
total += item.quantity;
});

document.getElementById("cart-count").innerText = total;

}

updateCartCount();


/* SEARCH */

document.getElementById("search-input").addEventListener("keyup",function(){

let value = this.value.toLowerCase();

let cards = document.querySelectorAll(".product-card");

cards.forEach(card=>{

let name = card.querySelector("h3").innerText.toLowerCase();

card.style.display = name.includes(value) ? "block" : "none";

});

});

</script>

</body>

</html>
